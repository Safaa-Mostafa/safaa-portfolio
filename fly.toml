app = "safaa-portfolio"

[build]
builder = "heroku/buildpacks:20"

[env]
PORT = "3000"

[processes]
app = "npm run preview -- --host 0.0.0.0 --port 3000"

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0
processes = ["app"]